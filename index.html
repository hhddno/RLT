<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RL Esports Tracker - Statistiques et historiques des matchs pro Rocket League.">
    <title>RL Esports Tracker</title>
    
    <!-- Google Fonts: Outfit and Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Icons (Lucide via CDN) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="logo">
                <i data-lucide="rocket" class="logo-icon"></i>
                <span>RLTracker</span>
            </div>
            <ul class="nav-links">
                <li><a href="#" class="nav-item active" data-view="home"><i data-lucide="layout-dashboard"></i> <span>Dashboard</span></a></li>
                <li><a href="#" class="nav-item" data-view="history"><i data-lucide="history"></i> <span>Historique RLCS</span></a></li>
                <li><a href="#" class="nav-item" data-view="players"><i data-lucide="users"></i> <span>Joueurs</span></a></li>
                <li><a href="#" class="nav-item" data-view="teams"><i data-lucide="shield"></i> <span>Équipes & Ranking</span></a></li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="topbar">
                <div class="search-bar">
                    <i data-lucide="search"></i>
                    <input type="text" placeholder="Rechercher un joueur, une équipe, un match...">
                </div>
                <div class="user-profile">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=davio" alt="User Profile">
                </div>
            </header>

            <div id="view-container" class="view-container">
                <!-- Dynamic views will be injected here -->
            </div>
        </main>
    </div>

    <!-- Scripts (No modules to support file:// protocol) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/mockData.js"></script>
    <script src="js/components.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
