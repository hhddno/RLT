<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RL Esports Tracker - Statistiques et historiques des matchs pro Rocket League.">
    <title>RL Esports Tracker</title>
    
    <!-- Google Fonts: Outfit and Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Icons (Lucide via CDN) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="logo">
                <i data-lucide="rocket" class="logo-icon"></i>
                <span>RLTracker</span>
            </div>
            <ul class="nav-links">
                <li><a href="#" class="nav-item active" data-view="home"><i data-lucide="layout-dashboard"></i> <span>Dashboard</span></a></li>
                <li><a href="#" class="nav-item" data-view="history"><i data-lucide="history"></i> <span>Historique RLCS</span></a></li>
                <li><a href="#" class="nav-item" data-view="players"><i data-lucide="users"></i> <span>Joueurs</span></a></li>
                <li><a href="#" class="nav-item" data-view="teams"><i data-lucide="shield"></i> <span>Équipes & Ranking</span></a></li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="topbar">
                <div class="search-bar">
                    <i data-lucide="search"></i>
                    <input type="text" placeholder="Rechercher un joueur, une équipe, un match...">
                </div>
                <div class="user-profile" id="user-profile-container">
                    <!-- Injected by Auth state -->
                </div>
            </header>

            <div id="view-container" class="view-container">
                <!-- Dynamic views will be injected here -->
            </div>
        </main>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content fade-in">
            <h2 style="margin-bottom: 1rem; font-family: var(--font-heading);">Connexion</h2>
            <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Simulez une connexion avec votre pseudo.</p>
            <input type="text" id="login-username" placeholder="Entrez un pseudo..." style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border-color); background: rgba(0,0,0,0.5); color: white; margin-bottom: 1.5rem;">
            <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                <button id="btn-cancel-login" style="padding: 0.5rem 1rem; background: transparent; border: none; color: var(--text-muted); cursor: pointer;">Annuler</button>
                <button id="btn-confirm-login" style="padding: 0.5rem 1rem; background: var(--accent-blue); border: none; border-radius: 8px; color: black; font-weight: bold; cursor: pointer;">Se Connecter</button>
            </div>
        </div>
    </div>

    <!-- Scripts (No modules to support file:// protocol) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/mockData.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
