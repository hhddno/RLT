<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RL Esports Tracker - Statistiques et historiques des matchs pro Rocket League RLCS.">
    <title>RLTracker — Rocket League Esports</title>
    
    <!-- Google Fonts: Outfit and Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    
    <!-- Icons (Lucide via CDN) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
  <script type="module" crossorigin src="/assets/index-9-9LNSCh.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-DcRRuH92.css">
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loader">
            <div class="loader-rocket">🚀</div>
            <span class="loader-text">Chargement...</span>
        </div>
    </div>

    <div id="app">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="logo">
                <i data-lucide="rocket" class="logo-icon"></i>
                <span>RLTracker</span>
            </div>
            <ul class="nav-links">
                <li><a href="#" class="nav-item active" data-view="home"><i data-lucide="layout-dashboard"></i> <span>Dashboard</span></a></li>
                <li><a href="#" class="nav-item" data-view="history"><i data-lucide="history"></i> <span>Historique RLCS</span></a></li>
                <li><a href="#" class="nav-item" data-view="players"><i data-lucide="users"></i> <span>Joueurs</span></a></li>
                <li><a href="#" class="nav-item" data-view="teams"><i data-lucide="shield"></i> <span>Équipes & Ranking</span></a></li>
                <li><a href="#" class="nav-item" data-view="predictions"><i data-lucide="trophy"></i> <span>Prédictions</span></a></li>
                <li><a href="#" class="nav-item" data-view="knowledge"><i data-lucide="book-open"></i> <span>Base de Données</span></a></li>
                <li><a href="#" class="nav-item" data-view="replay"><i data-lucide="monitor-play"></i> <span>Replay Studio</span></a></li>
            </ul>
            <div class="sidebar-footer">
                <div class="sidebar-badge">
                    <i data-lucide="zap"></i>
                    <span>RLCS 2025-26</span>
                </div>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="topbar">
                <div class="search-bar">
                    <i data-lucide="search"></i>
                    <input type="text" id="global-search" placeholder="Rechercher un joueur, une équipe, un match...">
                </div>
                <div class="user-profile" id="user-profile-container">
                    <!-- Injected by Auth state -->
                </div>
            </header>

            <div id="view-container" class="view-container">
                <!-- Dynamic views will be injected here -->
            </div>
        </main>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content fade-in">
            <div class="modal-header">
                <i data-lucide="rocket" style="color: var(--accent-blue); width: 32px; height: 32px;"></i>
                <h2>Connexion à RLTracker</h2>
            </div>
            <p style="color: var(--text-muted); margin-bottom: 1.5rem; text-align: center;">Entrez votre pseudo pour accéder aux favoris et prédictions.</p>
            <input type="text" id="login-username" placeholder="Votre pseudo..." class="modal-input">
            <div class="modal-actions">
                <button id="btn-cancel-login" class="btn-ghost">Annuler</button>
                <button id="btn-confirm-login" class="btn-primary">Se Connecter</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Firebase App (the core Firebase SDK) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <!-- Firebase Authentication -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <!-- Firebase Firestore -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <!-- App Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
